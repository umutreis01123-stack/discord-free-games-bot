<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowCore Bot - Ana Sayfa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        nav {
            background: rgba(20, 20, 40, 0.9);
            border-bottom: 2px solid #7c3aed;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #7c3aed;
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
        }
        
        .nav-buttons button {
            padding: 10px 20px;
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid #7c3aed;
            border-radius: 8px;
            color: #7c3aed;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .nav-buttons button:hover {
            background: #7c3aed;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .hero h1 {
            font-size: 48px;
            color: #7c3aed;
            margin-bottom: 20px;
        }
        
        .hero p {
            font-size: 18px;
            color: #b0b0c0;
            margin-bottom: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .stat-card {
            background: rgba(124, 58, 237, 0.1);
            border: 2px solid #7c3aed;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #7c3aed;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            font-size: 36px;
            color: #10b981;
            font-weight: bold;
        }
        
        .stocks-section {
            background: rgba(20, 20, 40, 0.8);
            border: 2px solid #7c3aed;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .stocks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .stocks-header h2 {
            color: #7c3aed;
            font-size: 24px;
        }
        
        .admin-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .stock-item {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid #7c3aed;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stock-item:hover {
            background: rgba(124, 58, 237, 0.2);
            transform: translateY(-5px);
        }
        
        .stock-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .stock-item .name {
            color: #7c3aed;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .stock-item .amount {
            color: #10b981;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stock-item .credit {
            color: #b0b0c0;
            font-size: 12px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
        }
        
        .modal-content {
            background: rgba(20, 20, 40, 0.95);
            margin: 10% auto;
            padding: 40px;
            border: 2px solid #7c3aed;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-content h2 {
            color: #7c3aed;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0c0;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #7c3aed;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            background: rgba(124, 58, 237, 0.1);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }
        
        .form-group .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        
        .strength-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            background: #ff4444;
            transition: all 0.3s;
        }
        
        .strength-fill.weak {
            width: 33%;
            background: #ff4444;
        }
        
        .strength-fill.medium {
            width: 66%;
            background: #ffaa00;
        }
        
        .strength-fill.strong {
            width: 100%;
            background: #10b981;
        }
        
        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .form-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: #fff;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }
        
        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #b0b0c0;
            border: 1px solid #7c3aed;
        }
        
        .btn-cancel:hover {
            background: rgba(124, 58, 237, 0.1);
        }
        
        .toggle-form {
            text-align: center;
            margin-top: 15px;
            color: #b0b0c0;
            font-size: 14px;
        }
        
        .toggle-form a {
            color: #7c3aed;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .error {
            color: #ff8888;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .close {
            color: #b0b0c0;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .close:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">🤖 ShadowCore Bot</div>
        <div class="nav-buttons">
            <button onclick="openLoginModal()">🔐 Giriş Yap</button>
            <button onclick="openRegisterModal()">📝 Kayıt Ol</button>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Hero Section -->
        <div class="hero">
            <h1>Oyun Hesapları Yönetim Sistemi</h1>
            <p>Kolayca hesap yönetin, promosyon kodlarını kullanın</p>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <h3>Aktif Sunucular</h3>
                <div class="number" id="serverCount">5</div>
            </div>
            <div class="stat-card">
                <h3>Toplam Hesaplar</h3>
                <div class="number" id="totalStocks">0</div>
            </div>
            <div class="stat-card">
                <h3>Promosyon Kodları</h3>
                <div class="number" id="promoCount">0</div>
            </div>
        </div>
        
        <!-- Stocks Section -->
        <div class="stocks-section">
            <div class="stocks-header">
                <h2>📦 Stoklar</h2>
                <button class="admin-btn" onclick="openLoginModal()">⚙️ Yönetim Paneli</button>
            </div>
            <div class="stocks-grid" id="stocksGrid">
                <!-- Stoklar buraya yüklenecek -->
            </div>
        </div>
    </div>
    
    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2>🔐 Giriş Yap</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div id="loginError" class="error"></div>
                <div class="form-buttons">
                    <button type="submit" class="btn-submit">Giriş Yap</button>
                    <button type="button" class="btn-cancel" onclick="closeLoginModal()">İptal</button>
                </div>
            </form>
            <div class="toggle-form">
                Hesabınız yok mu? <a onclick="toggleForms()">Kayıt olun</a>
            </div>
        </div>
    </div>
    
    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRegisterModal()">&times;</span>
            <h2>📝 Kayıt Ol</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>İsim</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>E-Posta</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="regPassword" oninput="checkPasswordStrength()" required>
                    <div class="password-strength">
                        <span id="strengthText">Zayıf</span>
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthBar"></div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Şifre Tekrar</label>
                    <input type="password" id="regPasswordConfirm" required>
                </div>
                <div id="registerError" class="error"></div>
                <div class="form-buttons">
                    <button type="submit" class="btn-submit">Kayıt Ol</button>
                    <button type="button" class="btn-cancel" onclick="closeRegisterModal()">İptal</button>
                </div>
            </form>
            <div class="toggle-form">
                Zaten hesabınız var mı? <a onclick="toggleForms()">Giriş yapın</a>
            </div>
        </div>
    </div>
    
    <script>
        // API Base URL
        const API_BASE = window.location.origin;
        
        // Load stocks on page load
        loadStocks();
        loadServers();
        
        async function loadStocks() {
            try {
                const response = await fetch(`${API_BASE}/api/public/stocks`);
                const stocks = await response.json();
                
                let totalStocks = 0;
                const grid = document.getElementById('stocksGrid');
                grid.innerHTML = '';
                
                stocks.forEach(stock => {
                    totalStocks += stock.amount;
                    const item = document.createElement('div');
                    item.className = 'stock-item';
                    item.innerHTML = `
                        <div class="icon">📦</div>
                        <div class="name">${stock.name}</div>
                        <div class="amount">${stock.amount} adet</div>
                        <div class="credit">${stock.credits} kredi</div>
                    `;
                    grid.appendChild(item);
                });
                
                document.getElementById('totalStocks').textContent = totalStocks;
            } catch (error) {
                console.error('Load stocks error:', error);
                document.getElementById('stocksGrid').innerHTML = '<p style="color: #ff8888;">Stoklar yüklenemedi</p>';
            }
        }
        
        async function loadServers() {
            try {
                const response = await fetch(`${API_BASE}/api/servers`);
                const servers = await response.json();
                document.getElementById('serverCount').textContent = servers.length;
            } catch (error) {
                console.error('Load servers error:', error);
            }
        }
        
        function openLoginModal() {
            document.getElementById('loginModal').style.display = 'block';
            document.getElementById('registerModal').style.display = 'none';
        }
        
        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        
        function openRegisterModal() {
            document.getElementById('registerModal').style.display = 'block';
            document.getElementById('loginModal').style.display = 'none';
        }
        
        function closeRegisterModal() {
            document.getElementById('registerModal').style.display = 'none';
        }
        
        function toggleForms() {
            if (document.getElementById('loginModal').style.display === 'block') {
                closeLoginModal();
                openRegisterModal();
            } else {
                closeRegisterModal();
                openLoginModal();
            }
        }
        
        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;
            
            bar.className = 'strength-fill';
            if (strength === 1) {
                bar.classList.add('weak');
                text.textContent = 'Zayıf';
            } else if (strength === 2 || strength === 3) {
                bar.classList.add('medium');
                text.textContent = 'Orta';
            } else if (strength >= 4) {
                bar.classList.add('strong');
                text.textContent = 'Güçlü';
            }
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin/panel.html';
                } else {
                    document.getElementById('loginError').textContent = 'Hatalı giriş!';
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'Giriş başarısız!';
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            
            if (password !== passwordConfirm) {
                document.getElementById('registerError').textContent = 'Şifreler eşleşmiyor!';
                return;
            }
            
            if (password.length < 8) {
                document.getElementById('registerError').textContent = 'Şifre en az 8 karakter olmalı!';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Kayıt başarılı! Giriş yapabilirsiniz.');
                    closeRegisterModal();
                    openLoginModal();
                } else {
                    document.getElementById('registerError').textContent = data.message || 'Kayıt başarısız!';
                }
            } catch (error) {
                document.getElementById('registerError').textContent = 'Kayıt başarısız!';
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const loginModal = document.getElementById('loginModal');
            const registerModal = document.getElementById('registerModal');
            if (event.target === loginModal) {
                loginModal.style.display = 'none';
            }
            if (event.target === registerModal) {
                registerModal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
