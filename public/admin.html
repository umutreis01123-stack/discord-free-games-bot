<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Giriş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-box {
            background: rgba(20, 20, 40, 0.9);
            border: 2px solid #7c3aed;
            border-radius: 15px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3);
        }
        
        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #7c3aed;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0c0;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #7c3aed;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            background: rgba(124, 58, 237, 0.1);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }
        
        .error {
            color: #ff8888;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
        
        .back-btn {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-btn a {
            color: #7c3aed;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .back-btn a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 Admin Paneli</h1>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" required placeholder="Kullanıcı adınız">
            </div>
            <button type="submit" class="login-btn">Giriş Yap</button>
            <div id="error" class="error"></div>
        </form>
        <div class="back-btn">
            <a onclick="window.location.href='/'">← Ana Sayfa</a>
        </div>
    </div>
    
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            
            if (username === 'umutreis_') {
                localStorage.setItem('adminToken', 'admin-' + Date.now());
                window.location.href = '/admin-panel';
            } else {
                document.getElementById('error').textContent = 'Hatalı kullanıcı adı';
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
