<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-form h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #764ba2;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Admin Panel Styles */
        .admin-panel {
            display: none;
            background: white;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 2em;
        }

        .btn-logout {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-logout:hover {
            background: #c0392b;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tabs button {
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .tabs button.active {
            background: #764ba2;
        }

        .tabs button:hover {
            background: #764ba2;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }

        .btn-add {
            background: #27ae60;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-add:hover {
            background: #229954;
        }

        .list-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .list-item h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .list-item p {
            color: #666;
            margin-bottom: 5px;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-delete:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginContainer" class="login-container">
        <div class="login-form">
            <h1>🔐 Yönetim Paneli</h1>
            <div id="loginMessage"></div>
            <form onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı:</label>
                    <input type="text" id="adminUsername" required>
                </div>
                <div class="form-group">
                    <label>Şifre:</label>
                    <input type="password" id="adminPassword" required>
                </div>
                <button type="submit" class="btn-submit">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-container">
            <div class="admin-header">
                <h1>⚙️ Yönetim Paneli</h1>
                <button class="btn-logout" onclick="handleLogout()">Çıkış Yap</button>
            </div>

            <div class="tabs">
                <button class="active" onclick="switchTab('servers')">Sunucular</button>
                <button onclick="switchTab('accounts')">Hesaplar</button>
                <button onclick="switchTab('users')">Kullanıcılar</button>
            </div>

            <!-- Sunucular Tab -->
            <div id="servers" class="tab-content active">
                <h2>Sunucuları Yönet</h2>
                
                <div style="margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 10px;">
                    <h3 style="margin-bottom: 15px;">Yeni Sunucu Ekle</h3>
                    <form onsubmit="handleAddServer(event)">
                        <div class="form-group">
                            <label>Sunucu Adı:</label>
                            <input type="text" id="serverName" required>
                        </div>
                        <div class="form-group">
                            <label>Oyuncu Sayısı:</label>
                            <input type="number" id="playerCount" value="0" required>
                        </div>
                        <button type="submit" class="btn-add">➕ Sunucu Ekle</button>
                    </form>
                </div>

                <h3>Mevcut Sunucular</h3>
                <div id="serversList"></div>
            </div>

            <!-- Hesaplar Tab -->
            <div id="accounts" class="tab-content">
                <h2>Hesapları Yönet</h2>
                
                <div style="margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 10px;">
                    <h3 style="margin-bottom: 15px;">Yeni Hesap Ekle</h3>
                    <form onsubmit="handleAddAccount(event)">
                        <div class="form-group">
                            <label>Hesap Adı:</label>
                            <input type="text" id="accountName" required>
                        </div>
                        <div class="form-group">
                            <label>Hesap Detayları:</label>
                            <textarea id="accountDetails" rows="5" required style="resize: vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn-add">➕ Hesap Ekle</button>
                    </form>
                </div>

                <h3>Mevcut Hesaplar</h3>
                <div id="accountsList"></div>
            </div>

            <!-- Kullanıcılar Tab -->
            <div id="users" class="tab-content">
                <h2>Kayıtlı Kullanıcılar</h2>
                <div id="usersList"></div>
            </div>
        </div>
    </div>

    <footer style="text-align: center; color: #666; padding: 20px; margin-top: 40px;">
        <p>&copy; 2026 Zwozez discord botu. Tüm hakları saklıdır.</p>
    </footer>

    <script>
        let adminToken = null;

        function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            fetch('/api/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadDashboard();
                } else {
                    document.getElementById('loginMessage').innerHTML = 
                        '<div class="message error">' + data.error + '</div>';
                }
            });
        }

        function handleLogout() {
            adminToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
        }

        function switchTab(tabName) {
            // Tüm tab içeriklerini gizle
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Tüm butonları pasif yap
            document.querySelectorAll('.tabs button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Seçilen tab'i göster
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        async function handleAddServer(event) {
            event.preventDefault();
            
            const name = document.getElementById('serverName').value;
            const playerCount = document.getElementById('playerCount').value;

            const response = await fetch('/api/admin/add-server', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, name, playerCount })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('Sunucu başarıyla eklendi!');
                document.getElementById('serverName').value = '';
                document.getElementById('playerCount').value = '0';
                loadServers();
            } else {
                alert('Hata: ' + data.error);
            }
        }

        async function handleAddAccount(event) {
            event.preventDefault();
            
            const name = document.getElementById('accountName').value;
            const details = document.getElementById('accountDetails').value;

            const response = await fetch('/api/admin/add-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, name, details })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('Hesap başarıyla eklendi!');
                document.getElementById('accountName').value = '';
                document.getElementById('accountDetails').value = '';
                loadAccounts();
            } else {
                alert('Hata: ' + data.error);
            }
        }

        async function loadServers() {
            const response = await fetch('/api/servers');
            const servers = await response.json();
            
            const serversList = document.getElementById('serversList');
            serversList.innerHTML = '';
            
            servers.forEach(server => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <h3>${server.name}</h3>
                    <p>👥 Oyuncu Sayısı: ${server.playerCount}</p>
                `;
                serversList.appendChild(div);
            });
        }

        async function loadAccounts() {
            // İleride API'den çekilecek
            const accountsList = document.getElementById('accountsList');
            accountsList.innerHTML = '<p style="text-align: center; color: #666;">Henüz hesap eklenmemiş.</p>';
        }

        async function loadUsers() {
            // İleride API'den çekilecek
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '<p style="text-align: center; color: #666;">Kullanıcılar yükleniyor...</p>';
        }

        function loadDashboard() {
            loadServers();
            loadAccounts();
            loadUsers();
        }

        // Sayfa yüklendiğinde kontrol et
        window.onload = () => {
            const token = localStorage.getItem('adminToken');
            if (token) {
                adminToken = token;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadDashboard();
            }
        };
    </script>
</body>
</html>
