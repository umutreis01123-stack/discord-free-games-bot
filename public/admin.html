<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Zwozez Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ecf0f1;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-form {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #e94560;
            width: 100%;
            max-width: 400px;
        }

        .login-form h1 {
            color: #e94560;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ecf0f1;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e94560;
            border-radius: 5px;
            font-size: 1em;
            background: #0f3460;
            color: #ecf0f1;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 5px #e94560;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #d93654;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .message.error {
            background: #e74c3c;
            color: white;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-header {
            background: #16213e;
            color: #ecf0f1;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e94560;
        }

        .admin-header h1 {
            color: #e94560;
            font-size: 2em;
        }

        .btn-logout {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-logout:hover {
            background: #7f8c8d;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid #16213e;
            padding-bottom: 10px;
        }

        .tabs button {
            background: #16213e;
            color: #ecf0f1;
            padding: 12px 20px;
            border: 1px solid #0f3460;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tabs button.active {
            background: #e94560;
            border-color: #e94560;
        }

        .tabs button:hover {
            background: #0f3460;
        }

        .tab-content {
            display: none;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #0f3460;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.6em;
        }

        .form-section {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid #16213e;
        }

        .form-section h3 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #16213e;
            border-radius: 5px;
            font-size: 1em;
            background: #1a1a2e;
            color: #ecf0f1;
            font-family: inherit;
            margin-top: 5px;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 5px #e94560;
        }

        .btn-add {
            background: #2ecc71;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: #27ae60;
        }

        .list-item {
            background: #1a1a2e;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 4px solid #e94560;
        }

        .list-item h3 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .list-item p {
            color: #bdc3c7;
            margin-bottom: 8px;
        }

        .list-item .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-approve {
            background: #2ecc71;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-approve:hover {
            background: #27ae60;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .btn-credit {
            background: #3498db;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-credit:hover {
            background: #2980b9;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .list-item .actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Giriş Ekranı -->
    <div id="loginContainer" class="login-container">
        <div class="login-form">
            <h1>🔐 Admin Paneli</h1>
            <div id="loginMessage"></div>
            <form onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı:</label>
                    <input type="text" id="adminUsername" required>
                </div>
                <div class="form-group">
                    <label>Şifre:</label>
                    <input type="password" id="adminPassword" required>
                </div>
                <button type="submit" class="btn-submit">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Admin Paneli -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-container">
            <div class="admin-header">
                <h1>⚙️ Admin Paneli</h1>
                <button class="btn-logout" onclick="handleLogout()">Çıkış Yap</button>
            </div>

            <div class="tabs">
                <button class="active" onclick="switchTab('products')">📦 Ürünler</button>
                <button onclick="switchTab('users')">👥 Oyuncular</button>
                <button onclick="switchTab('requests')">📤 Hesap İstekleri</button>
                <button onclick="switchTab('notifications')">🔔 Bildirimler</button>
                <button onclick="switchTab('support')">💬 Destek</button>
            </div>

            <!-- Ürünler Tab -->
            <div id="products" class="tab-content active">
                <h2>📦 Ürün Yönetimi</h2>
                
                <div class="form-section">
                    <h3>Yeni Ürün Ekle</h3>
                    <form onsubmit="handleAddProduct(event)">
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Ürün Adı:</label>
                                <input type="text" id="productName" required>
                            </div>
                            <div class="form-group">
                                <label>Fiyat (₺):</label>
                                <input type="number" id="productPrice" required>
                            </div>
                            <div class="form-group">
                                <label>Stok Sayısı:</label>
                                <input type="number" id="productStock" value="0" required>
                            </div>
                            <div class="form-group">
                                <label>Emoji/İkon:</label>
                                <input type="text" id="productImage" placeholder="📦" value="📦">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Bağlantı (URL):</label>
                            <input type="url" id="productLink" placeholder="https://...">
                        </div>
                        <button type="submit" class="btn-add">➕ Ürün Ekle</button>
                    </form>
                </div>

                <h3>Mevcut Ürünler</h3>
                <div id="productsList"></div>
            </div>

            <!-- Oyuncular Tab -->
            <div id="users" class="tab-content">
                <h2>👥 Oyuncu Yönetimi</h2>
                <div id="usersList"></div>
            </div>

            <!-- Hesap İstekleri Tab -->
            <div id="requests" class="tab-content">
                <h2>📤 Hesap Gönder İstekleri</h2>
                
                <div class="form-section">
                    <h3>Manuel Hesap Gönder</h3>
                    <form onsubmit="handleSendManualAccount(event)">
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Kullanıcı Seç:</label>
                                <select id="manualUserId" required>
                                    <option value="">Yükleniyor...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Ürün Seç (Opsiyonel):</label>
                                <select id="manualProductId">
                                    <option value="">Hiç seçme / Manuel Yaz</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Hesap Bilgisi:</label>
                            <textarea id="manualAccountInfo" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn-add">📤 Hesap Gönder</button>
                    </form>
                </div>

                <h3>Bekleyen İstekler</h3>
                <div id="requestsList"></div>
            </div>

            <!-- Bildirimler Tab -->
            <div id="notifications" class="tab-content">
                <h2>🔔 Ürün Bildirimleri</h2>
                
                <div class="form-section">
                    <h3>Tüm Oyunculara Bildirim Gönder</h3>
                    <form onsubmit="handleSendNotification(event)">
                        <div class="form-group">
                            <label>Konu:</label>
                            <input type="text" id="notificationTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Mesaj:</label>
                            <textarea id="notificationMessage" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn-add">📨 Gönder</button>
                    </form>
                </div>

                <h3>Gönderilen Bildirimler</h3>
                <div id="notificationsList"></div>
            </div>

            <!-- Destek Tab -->
            <div id="support" class="tab-content">
                <h2>💬 Destek Talepleri</h2>
                <div id="supportList"></div>
            </div>
        </div>
    </div>

    <script>
        let adminToken = null;

        function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            fetch('/api/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    adminToken = 'admin_token';
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadDashboard();
                } else {
                    document.getElementById('loginMessage').innerHTML = 
                        '<div class="message error">' + data.error + '</div>';
                }
            });
        }

        function handleLogout() {
            adminToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.querySelectorAll('.tabs button').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        async function handleAddProduct(event) {
            event.preventDefault();
            
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const stock = document.getElementById('productStock').value;
            const image = document.getElementById('productImage').value;
            const link = document.getElementById('productLink').value;

            const response = await fetch('/api/admin/add-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, name, price, image, link, stock })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('✅ Ürün başarıyla eklendi!');
                event.target.reset();
                loadProducts();
            } else {
                alert('❌ Hata: ' + data.error);
            }
        }

        async function handleSendManualAccount(event) {
            event.preventDefault();
            
            const userId = document.getElementById('manualUserId').value;
            const productId = document.getElementById('manualProductId').value || null;
            const customAccount = document.getElementById('manualAccountInfo').value;

            const response = await fetch('/api/request-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, productId, customAccount })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('✅ Hesap gönderildi!');
                event.target.reset();
                loadRequests();
            } else {
                alert('❌ Hata: ' + data.error);
            }
        }

        async function handleSendNotification(event) {
            event.preventDefault();
            
            const title = document.getElementById('notificationTitle').value;
            const message = document.getElementById('notificationMessage').value;

            alert('✅ Bildirim gönderildi!');
            event.target.reset();
            loadNotifications();
        }

        async function loadProducts() {
            const response = await fetch('/api/products');
            const products = await response.json();
            
            const productsList = document.getElementById('productsList');
            productsList.innerHTML = '';
            
            if (products.length === 0) {
                productsList.innerHTML = '<p style="color: #7f8c8d;">Henüz ürün eklenmemiş.</p>';
                return;
            }

            productsList.innerHTML = products.map(product => `
                <div class="list-item">
                    <h3>${product.image} ${product.name}</h3>
                    <p>💰 Fiyat: ${product.price}₺</p>
                    <p>📦 Stok: ${product.stock}</p>
                    ${product.link ? `<p>🔗 <a href="${product.link}" target="_blank" style="color: #3498db;">${product.link}</a></p>` : ''}
                </div>
            `).join('');

            // Ürün seçim listesini doldur
            const select = document.getElementById('manualProductId');
            select.innerHTML = '<option value="">Hiç seçme / Manuel Yaz</option>';
            products.forEach(product => {
                select.innerHTML += `<option value="${product.id}">${product.image} ${product.name}</option>`;
            });
        }

        async function loadUsers() {
            const response = await fetch('/api/admin/users');
            const users = await response.json();
            
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';
            
            if (users.length === 0) {
                usersList.innerHTML = '<p style="color: #7f8c8d;">Henüz kullanıcı yok.</p>';
                return;
            }

            usersList.innerHTML = users.map(user => `
                <div class="list-item">
                    <h3>👤 ${user.username}</h3>
                    <p>🆔 Discord: ${user.discordId}</p>
                    <p>📧 E-posta: ${user.email}</p>
                    <p>💰 Kredi: <span style="color: #2ecc71;">${user.credits}₺</span></p>
                    <div class="actions">
                        <button class="btn-credit" onclick="addCredit('${user.id}')">➕ Kredi Ver</button>
                        <input type="number" id="credit-${user.id}" min="1" placeholder="Miktar" style="width: 100px; padding: 5px;">
                    </div>
                </div>
            `).join('');

            // Kullanıcı seçim listesini doldur
            const select = document.getElementById('manualUserId');
            select.innerHTML = '';
            users.forEach(user => {
                select.innerHTML += `<option value="${user.id}">${user.username} (${user.discordId})</option>`;
            });
        }

        async function addCredit(userId) {
            const amount = document.getElementById(`credit-${userId}`).value;
            
            if (!amount || amount <= 0) {
                alert('Lütfen geçerli bir miktar girin');
                return;
            }

            const response = await fetch('/api/admin/add-credit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, userId, amount })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('✅ Kredi verildi!');
                document.getElementById(`credit-${userId}`).value = '';
                loadUsers();
            } else {
                alert('❌ Hata: ' + data.error);
            }
        }

        async function loadRequests() {
            const response = await fetch('/api/admin/pending-requests');
            const requests = await response.json();
            
            const requestsList = document.getElementById('requestsList');
            requestsList.innerHTML = '';
            
            if (requests.length === 0) {
                requestsList.innerHTML = '<p style="color: #7f8c8d;">Bekleyen istek yok.</p>';
                return;
            }

            requestsList.innerHTML = requests.map(req => `
                <div class="list-item">
                    <h3>👤 ${req.username}</h3>
                    <p>🆔 Discord: ${req.discordId}</p>
                    <p>📦 Ürün: ${req.productId || req.customAccount}</p>
                    <div class="actions">
                        <button class="btn-approve" onclick="approveRequest('${req.id}')">✅ Onayla & Gönder</button>
                    </div>
                </div>
            `).join('');
        }

        async function approveRequest(requestId) {
            const response = await fetch('/api/admin/approve-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, requestId })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('✅ Hesap gönderildi!');
                loadRequests();
            } else {
                alert('❌ Hata: ' + data.error);
            }
        }

        function loadNotifications() {
            const notificationsList = document.getElementById('notificationsList');
            notificationsList.innerHTML = '<p style="color: #7f8c8d;">Henüz bildirim yok.</p>';
        }

        function loadDashboard() {
            loadProducts();
            loadUsers();
            loadRequests();
            loadNotifications();
        }

        window.onload = () => {
            const token = localStorage.getItem('adminToken');
            if (token) {
                adminToken = token;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadDashboard();
            }
        };
    </script>
</body>
</html>
