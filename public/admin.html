<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - Zwozez Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ecf0f1;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-form {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #e94560;
            width: 100%;
            max-width: 400px;
        }

        .login-form h1 {
            color: #e94560;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ecf0f1;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e94560;
            border-radius: 5px;
            font-size: 1em;
            background: #0f3460;
            color: #ecf0f1;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 5px #e94560;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #d93654;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .message.error {
            background: #e74c3c;
            color: white;
        }

        .message.success {
            background: #2ecc71;
            color: white;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-header {
            background: #16213e;
            color: #ecf0f1;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e94560;
        }

        .admin-header h1 {
            color: #e94560;
            font-size: 2em;
        }

        .btn-logout {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-logout:hover {
            background: #7f8c8d;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tabs button {
            background: #16213e;
            color: #ecf0f1;
            padding: 12px 20px;
            border: 1px solid #0f3460;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tabs button.active {
            background: #e94560;
            border-color: #e94560;
        }

        .tabs button:hover {
            background: #0f3460;
        }

        .tab-content {
            display: none;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #0f3460;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.6em;
        }

        .form-section {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid #16213e;
        }

        .form-section h3 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #16213e;
            border-radius: 5px;
            font-size: 1em;
            background: #1a1a2e;
            color: #ecf0f1;
            font-family: inherit;
            margin-top: 5px;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 5px #e94560;
        }

        .btn-add {
            background: #2ecc71;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: #27ae60;
        }

        .list-item {
            background: #1a1a2e;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 4px solid #e94560;
        }

        .list-item h3 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .list-item p {
            color: #bdc3c7;
            margin-bottom: 8px;
        }

        .list-item .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .list-item .actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Giriş Ekranı -->
    <div id="loginContainer" class="login-container">
        <div class="login-form">
            <h1>🔐 Admin Paneli</h1>
            <div id="loginMessage"></div>
            <form onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı:</label>
                    <input type="text" id="adminUsername" required>
                </div>
                <div class="form-group">
                    <label>Şifre:</label>
                    <input type="password" id="adminPassword" required>
                </div>
                <button type="submit" class="btn-submit">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Admin Paneli -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-container">
            <div class="admin-header">
                <h1>⚙️ Admin Paneli</h1>
                <button class="btn-logout" onclick="handleLogout()">Çıkış Yap</button>
            </div>

            <div class="tabs">
                <button class="active" onclick="switchTab('stocks')">📦 Stoklar</button>
                <button onclick="switchTab('products')">🎮 Ürünler</button>
            </div>

            <!-- Stoklar Tab -->
            <div id="stocks" class="tab-content active">
                <h2>📦 Stok Yönetimi</h2>
                
                <div class="form-section">
                    <h3>Yeni Stok Oluştur</h3>
                    <form onsubmit="handleCreateStock(event)">
                        <div class="form-group">
                            <label>Stok Adı:</label>
                            <input type="text" id="stockName" required>
                        </div>
                        <button type="submit" class="btn-add">➕ Stok Oluştur</button>
                    </form>
                </div>

                <h3>Mevcut Stoklar</h3>
                <div id="stocksList"></div>
            </div>

            <!-- Ürünler Tab -->
            <div id="products" class="tab-content">
                <h2>🎮 Ürün Yönetimi</h2>
                
                <div class="form-section">
                    <h3>Yeni Ürün Ekle</h3>
                    <form onsubmit="handleAddProduct(event)">
                        <div class="form-group">
                            <label>Ürün Adı:</label>
                            <input type="text" id="productName" required>
                        </div>
                        <div class="form-group">
                            <label>Hangi Stok:</label>
                            <select id="productStock" required>
                                <option value="">Stok Seç...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ürün Detayları:</label>
                            <textarea id="productDetails" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn-add">➕ Ürün Ekle</button>
                    </form>
                </div>

                <h3>Tüm Ürünler</h3>
                <div id="productsList"></div>
            </div>
        </div>
    </div>

    <script>
        let adminToken = null;

        function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            fetch('/api/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', data.token);
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadDashboard();
                } else {
                    document.getElementById('loginMessage').innerHTML = 
                        '<div class="message error">' + data.error + '</div>';
                }
            });
        }

        function handleLogout() {
            adminToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.querySelectorAll('.tabs button').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        async function handleCreateStock(event) {
            event.preventDefault();
            
            const name = document.getElementById('stockName').value;

            const response = await fetch('/api/admin/create-stock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, name })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('✅ Stok oluşturuldu!');
                document.getElementById('stockName').value = '';
                loadStocks();
                loadProducts();
            } else {
                alert('❌ Hata: ' + data.error);
            }
        }

        async function handleAddProduct(event) {
            event.preventDefault();
            
            const name = document.getElementById('productName').value;
            const stockId = document.getElementById('productStock').value;
            const details = document.getElementById('productDetails').value;

            const response = await fetch('/api/admin/add-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, name, stockId, details })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('✅ Ürün eklendi!');
                event.target.reset();
                loadProducts();
            } else {
                alert('❌ Hata: ' + data.error);
            }
        }

        async function loadStocks() {
            const response = await fetch('/api/stocks');
            const stocks = await response.json();
            
            const stocksList = document.getElementById('stocksList');
            stocksList.innerHTML = '';
            
            if (stocks.length === 0) {
                stocksList.innerHTML = '<p style="color: #7f8c8d;">Henüz stok eklenmemiş.</p>';
            } else {
                stocksList.innerHTML = stocks.map(stock => `
                    <div class="list-item">
                        <h3>📦 ${stock.name}</h3>
                        <p>Ürün Sayısı: ${stock.productCount}</p>
                        <div class="actions">
                            <button class="btn-delete" onclick="deleteStock('${stock.id}')">🗑️ Sil</button>
                        </div>
                    </div>
                `).join('');
            }

            // Seçim listesini doldur
            const select = document.getElementById('productStock');
            select.innerHTML = '<option value="">Stok Seç...</option>';
            stocks.forEach(stock => {
                select.innerHTML += `<option value="${stock.id}">${stock.name}</option>`;
            });
        }

        async function loadProducts() {
            // Ürünleri yükle (API'den çekmek gerekir)
            const productsList = document.getElementById('productsList');
            productsList.innerHTML = '<p style="color: #7f8c8d;">Ürün listesi yükleniyor...</p>';
        }

        async function deleteStock(stockId) {
            if (!confirm('Bu stoku silmek istediğinize emin misiniz?')) return;

            const response = await fetch(`/api/admin/stock/${stockId}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('✅ Stok silindi!');
                loadStocks();
                loadProducts();
            } else {
                alert('❌ Hata: ' + data.error);
            }
        }

        function loadDashboard() {
            loadStocks();
            loadProducts();
        }

        function showMessage(message, type) {
            const msgDiv = document.getElementById('loginMessage');
            msgDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => {
                msgDiv.innerHTML = '';
            }, 5000);
        }

        window.onload = () => {
            const token = localStorage.getItem('adminToken');
            if (token && token.startsWith('admin_token_')) {
                adminToken = token;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadDashboard();
            }
        };
    </script>
</body>
</html>
