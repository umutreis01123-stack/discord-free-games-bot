<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowCore - Giriş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            background: rgba(20, 20, 40, 0.9);
            border: 2px solid #7c3aed;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #7c3aed;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #b0b0c0;
            font-size: 14px;
        }
        
        .form-tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(124, 58, 237, 0.2);
            border: none;
            color: #7c3aed;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: #7c3aed;
            color: #fff;
        }
        
        .form-content {
            display: none;
        }
        
        .form-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0c0;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #7c3aed;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            background: rgba(124, 58, 237, 0.1);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }
        
        .error {
            color: #ff8888;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        
        .success {
            color: #10b981;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        
        .strength-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            background: #ff4444;
            transition: all 0.3s;
        }
        
        .strength-fill.weak {
            width: 33%;
            background: #ff4444;
        }
        
        .strength-fill.medium {
            width: 66%;
            background: #ffaa00;
        }
        
        .strength-fill.strong {
            width: 100%;
            background: #10b981;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>🤖 ShadowCore</h1>
            <p>Oyun Hesapları Yönetim Sistemi</p>
        </div>
        
        <div class="form-tabs">
            <button class="tab active" onclick="switchTab('login')">Giriş Yap</button>
            <button class="tab" onclick="switchTab('register')">Kayıt Ol</button>
        </div>
        
        <!-- Login Form -->
        <div class="form-content active" id="loginForm">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>E-Posta</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="submit-btn">Giriş Yap</button>
                <div id="loginMessage"></div>
            </form>
        </div>
        
        <!-- Register Form -->
        <div class="form-content" id="registerForm">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>İsim</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>E-Posta</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="regPassword" oninput="checkPasswordStrength()" required>
                    <div class="password-strength">
                        <span id="strengthText">Zayıf</span>
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthBar"></div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Şifre Tekrar</label>
                    <input type="password" id="regPasswordConfirm" required>
                </div>
                <button type="submit" class="submit-btn">Kayıt Ol</button>
                <div id="registerMessage"></div>
            </form>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        function switchTab(tab) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;
            
            bar.className = 'strength-fill';
            if (strength <= 1) {
                bar.classList.add('weak');
                text.textContent = 'Zayıf';
            } else if (strength <= 2) {
                bar.classList.add('medium');
                text.textContent = 'Orta';
            } else {
                bar.classList.add('strong');
                text.textContent = 'Güçlü';
            }
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userData', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    showMessage('loginMessage', data.message, 'error');
                }
            } catch (error) {
                showMessage('loginMessage', 'Giriş başarısız!', 'error');
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            
            if (password !== passwordConfirm) {
                showMessage('registerMessage', 'Şifreler eşleşmiyor!', 'error');
                return;
            }
            
            if (password.length < 8) {
                showMessage('registerMessage', 'Şifre en az 8 karakter olmalı!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    showMessage('registerMessage', 'Kayıt başarılı! Giriş yapabilirsiniz.', 'success');
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    showMessage('registerMessage', data.message, 'error');
                }
            } catch (error) {
                showMessage('registerMessage', 'Kayıt başarısız!', 'error');
            }
        }
        
        function showMessage(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }
        
        // Check if already logged in
        if (localStorage.getItem('userToken')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
