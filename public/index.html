<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot - İstatistikler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .bot-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #667eea;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .bot-name {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .bot-status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .status-online {
            background: #2ecc71;
            color: white;
        }

        .status-offline {
            background: #e74c3c;
            color: white;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1em;
            opacity: 0.9;
        }

        .founder-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.3);
        }

        .founder-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .founder-id {
            font-size: 1.5em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            padding: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 30px 20px;
            }

            .bot-name {
                font-size: 1.5em;
            }
            
            .founder-id {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Bot Avatar" class="bot-avatar" id="botAvatar">
            <div class="bot-name" id="botName">Discord Bot</div>
            <div class="bot-status status-offline" id="botStatus">
                <span class="status-dot"></span>
                <span>Yükleniyor...</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="serverCount">-</div>
                <div class="stat-label">🖥️ Sunucu</div>
            </div>
        </div>

        <div class="founder-card">
            <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Kurucu Avatar" class="bot-avatar" id="founderAvatar" style="width: 80px; height: 80px; margin-bottom: 15px;">
            <div class="founder-title">👑 Kurucu</div>
            <div class="founder-id" id="founderName">Yükleniyor...</div>
            <div class="bot-status status-offline" id="founderStatus" style="margin-top: 15px; display: inline-flex;">
                <span class="status-dot"></span>
                <span>Yükleniyor...</span>
            </div>
        </div>

        <div class="footer">
            © 2026 Discord Bot - Tüm hakları saklıdır
        </div>
    </div>

    <script>
        // Bot istatistiklerini al
        async function fetchBotStats() {
            try {
                const response = await fetch('/api/bot-stats');
                const data = await response.json();

                // Bot bilgileri
                if (data.bot) {
                    document.getElementById('botName').textContent = data.bot.username;
                    if (data.bot.avatar) {
                        document.getElementById('botAvatar').src = data.bot.avatar;
                    }
                }

                // Durum
                const statusElement = document.getElementById('botStatus');
                if (data.status === 'online') {
                    statusElement.className = 'bot-status status-online';
                    statusElement.innerHTML = '<span class="status-dot"></span><span>🟢 Çevrimiçi</span>';
                } else {
                    statusElement.className = 'bot-status status-offline';
                    statusElement.innerHTML = '<span class="status-dot"></span><span>🔴 Çevrimdışı</span>';
                }

                // İstatistikler
                document.getElementById('serverCount').textContent = data.servers || '-';

                // Kurucu bilgileri
                if (data.founder) {
                    document.getElementById('founderName').textContent = data.founder.username || 'Yükleniyor...';
                    if (data.founder.avatar) {
                        document.getElementById('founderAvatar').src = data.founder.avatar;
                    }
                    
                    // Kurucu durumu
                    const founderStatusElement = document.getElementById('founderStatus');
                    if (data.founder.status === 'online') {
                        founderStatusElement.className = 'bot-status status-online';
                        founderStatusElement.innerHTML = '<span class="status-dot"></span><span>🟢 Çevrimiçi</span>';
                    } else if (data.founder.status === 'idle') {
                        founderStatusElement.className = 'bot-status status-online';
                        founderStatusElement.style.background = '#f39c12';
                        founderStatusElement.innerHTML = '<span class="status-dot"></span><span>🟡 Boşta</span>';
                    } else if (data.founder.status === 'dnd') {
                        founderStatusElement.className = 'bot-status status-offline';
                        founderStatusElement.innerHTML = '<span class="status-dot"></span><span>🔴 Rahatsız Etmeyin</span>';
                    } else {
                        founderStatusElement.className = 'bot-status status-offline';
                        founderStatusElement.innerHTML = '<span class="status-dot"></span><span>⚫ Çevrimdışı</span>';
                    }
                }

            } catch (error) {
                console.error('İstatistik yükleme hatası:', error);
                document.getElementById('botStatus').innerHTML = '<span class="status-dot"></span><span>❌ Bağlantı Hatası</span>';
            }
        }

        // İlk yükleme
        fetchBotStats();

        // Her 10 saniyede bir güncelle
        setInterval(fetchBotStats, 10000);
    </script>
</body>
</html>
