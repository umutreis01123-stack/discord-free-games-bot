<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwozez - Oyun Hesap Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ecf0f1;
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #e94560;
        }

        .logo {
            font-size: 1.8em;
            font-weight: bold;
            color: #e94560;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #e94560;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #d93654;
            transform: translateY(-2px);
        }

        .btn.admin {
            background: #f39c12;
        }

        .btn.admin:hover {
            background: #e67e22;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: 3em;
            color: #e94560;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2em;
            color: #95a5a6;
        }

        .user-info {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid #e94560;
            text-align: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: #16213e;
            border: 2px solid #e94560;
            border-radius: 10px;
            padding: 25px;
            transition: all 0.3s;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .product-name {
            font-size: 1.5em;
            color: #e94560;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .product-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .product-quantity {
            color: #2ecc71;
            font-weight: bold;
        }

        .product-credits {
            color: #f39c12;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #e94560;
            width: 90%;
            max-width: 400px;
        }

        .modal h2 {
            color: #e94560;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ecf0f1;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e94560;
            border-radius: 5px;
            background: #0f3460;
            color: #ecf0f1;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            box-shadow: 0 0 5px #e94560;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .btn-cancel {
            background: #95a5a6;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
        }

        .admin-panel {
            display: none;
            background: #0f3460;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
            border: 2px solid #f39c12;
        }

        .admin-panel h2 {
            color: #f39c12;
            margin-bottom: 20px;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .admin-tabs button {
            background: #16213e;
            color: #ecf0f1;
            padding: 10px 15px;
            border: 1px solid #f39c12;
            border-radius: 5px;
            cursor: pointer;
        }

        .admin-tabs button.active {
            background: #f39c12;
            color: #16213e;
        }

        .admin-tab-content {
            display: none;
        }

        .admin-tab-content.active {
            display: block;
        }

        .users-list, .orders-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item, .order-item {
            background: #16213e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #e94560;
        }

        footer {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            border-top: 1px solid #16213e;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .hero h1 {
                font-size: 2em;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .admin-tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎮 Zwozez</div>
        <div class="header-buttons" id="headerButtons">
            <button class="btn" onclick="openModal('loginModal')">Giriş Yap</button>
            <button class="btn" onclick="openModal('registerModal')">Kayıt Ol</button>
            <button class="btn admin" onclick="adminLogin()">Admin</button>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>🎮 Oyun Hesap Sistemi</h1>
            <p>Güvenli ve hızlı oyun hesabı al</p>
        </div>

        <!-- User Info -->
        <div id="userInfo" class="user-info" style="display: none;">
            <h3>Hoş geldiniz, <span id="userName"></span>!</h3>
            <p>💰 Krediniz: <span id="userCredits">0</span></p>
        </div>

        <!-- Products -->
        <div class="products-grid" id="productsGrid">
            <p style="text-align: center; color: #7f8c8d;">Ürünler yükleniyor...</p>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="admin-panel">
            <h2>⚙️ Yönetim Paneli</h2>
            
            <div class="admin-tabs">
                <button class="active" onclick="switchAdminTab('products')">Ürünler</button>
                <button onclick="switchAdminTab('users')">Kullanıcılar</button>
                <button onclick="switchAdminTab('orders')">Siparişler</button>
            </div>

            <!-- Products Tab -->
            <div id="adminProducts" class="admin-tab-content active">
                <h3>Ürün Ekle</h3>
                <form onsubmit="addProduct(event)" style="background: #16213e; padding: 20px; border-radius: 5px; margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Ürün Adı:</label>
                            <input type="text" id="adminProductName" required>
                        </div>
                        <div class="form-group">
                            <label>Adet:</label>
                            <input type="number" id="adminProductQuantity" required>
                        </div>
                        <div class="form-group">
                            <label>Kredi:</label>
                            <input type="number" id="adminProductCredits" required>
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Ürün Ekle</button>
                </form>
                
                <h3>Hesap Gönder</h3>
                <form onsubmit="sendAccount(event)" style="background: #16213e; padding: 20px; border-radius: 5px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Kullanıcı:</label>
                            <select id="sendUserId" required>
                                <option value="">Kullanıcı Seç</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ürün:</label>
                            <select id="sendProductId" required>
                                <option value="">Ürün Seç</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Hesap Bilgileri:</label>
                        <textarea id="accountDetails" rows="3" style="width: 100%; padding: 10px; background: #0f3460; color: #ecf0f1; border: 1px solid #e94560; border-radius: 5px;"></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Hesap Gönder</button>
                </form>
            </div>

            <!-- Users Tab -->
            <div id="adminUsers" class="admin-tab-content">
                <h3>Kredi Ver</h3>
                <form onsubmit="giveCredits(event)" style="background: #16213e; padding: 20px; border-radius: 5px; margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Kullanıcı:</label>
                            <select id="creditUserId" required>
                                <option value="">Kullanıcı Seç</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kredi Miktarı:</label>
                            <input type="number" id="creditAmount" required>
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Kredi Ver</button>
                </form>
                
                <h3>Kullanıcılar</h3>
                <div id="usersList" class="users-list"></div>
            </div>

            <!-- Orders Tab -->
            <div id="adminOrders" class="admin-tab-content">
                <h3>Bekleyen Siparişler</h3>
                <div id="ordersList" class="orders-list"></div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Zwozez. Tüm hakları saklıdır.</p>
        </footer>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Giriş Yap</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Discord ID:</label>
                    <input type="text" id="loginDiscordId" required>
                </div>
                <div class="form-group">
                    <label>Şifre:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeModal('loginModal')">İptal</button>
                    <button type="submit" class="btn">Giriş</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>Kayıt Ol</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>İsim:</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>Discord ID:</label>
                    <input type="text" id="regDiscordId" required>
                </div>
                <div class="form-group">
                    <label>E-posta:</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Şifre:</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeModal('registerModal')">İptal</button>
                    <button type="submit" class="btn">Kayıt Ol</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Buy Modal -->
    <div id="buyModal" class="modal">
        <div class="modal-content">
            <h2 id="buyModalTitle">Ürün Satın Al</h2>
            <div id="buyModalContent"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let adminMode = false;

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const discordId = document.getElementById('loginDiscordId').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ discordId, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentUser = data.user;
                    closeModal('loginModal');
                    updateUI();
                    alert('✅ Giriş başarılı!');
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ Hata: ' + error.message);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value;
            const discordId = document.getElementById('regDiscordId').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, discordId, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    closeModal('registerModal');
                    alert('✅ Kayıt başarılı! Giriş yapabilirsiniz.');
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ Hata: ' + error.message);
            }
        }

        async function adminLogin() {
            const username = prompt('Kullanıcı Adı:');
            const password = prompt('Şifre:');
            
            if (!username || !password) return;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    adminMode = true;
                    updateUI();
                    loadAdminData();
                    alert('✅ Admin girişi başarılı!');
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ Hata: ' + error.message);
            }
        }

        function updateUI() {
            const headerButtons = document.getElementById('headerButtons');
            const userInfo = document.getElementById('userInfo');
            const adminPanel = document.getElementById('adminPanel');

            if (currentUser) {
                headerButtons.innerHTML = `
                    <span style="color: #2ecc71; font-weight: bold;">${currentUser.name}</span>
                    <button class="btn btn-cancel" onclick="logout()">Çıkış</button>
                `;
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userCredits').textContent = currentUser.credits;
                userInfo.style.display = 'block';
            }

            if (adminMode) {
                adminPanel.style.display = 'block';
            }
        }

        function logout() {
            currentUser = null;
            adminMode = false;
            document.getElementById('headerButtons').innerHTML = `
                <button class="btn" onclick="openModal('loginModal')">Giriş Yap</button>
                <button class="btn" onclick="openModal('registerModal')">Kayıt Ol</button>
                <button class="btn admin" onclick="adminLogin()">Admin</button>
            `;
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const grid = document.getElementById('productsGrid');
                
                if (products.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: #7f8c8d;">Henüz ürün eklenmemiş</p>';
                    return;
                }

                grid.innerHTML = products.map(product => `
                    <div class="product-card">
                        <div class="product-name">${product.name}</div>
                        <div class="product-info">
                            <span class="product-quantity">📦 ${product.quantity} adet</span>
                            <span class="product-credits">💰 ${product.credits} kredi</span>
                        </div>
                        <button class="btn" onclick="buyProduct('${product.id}', '${product.name}', ${product.credits})" ${!currentUser ? 'disabled' : ''}>
                            ${currentUser ? 'Satın Al' : 'Giriş Gerekli'}
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ürünler yüklenemedi:', error);
            }
        }

        function buyProduct(productId, productName, credits) {
            if (!currentUser) {
                alert('Lütfen giriş yapın');
                return;
            }

            const quantity = prompt(`${productName} - Kaç adet almak istiyorsunuz?`);
            if (!quantity || quantity <= 0) return;

            const totalCost = credits * quantity;
            
            if (currentUser.credits < totalCost) {
                alert('❌ Yetersiz kredi!');
                return;
            }

            if (confirm(`${quantity} adet ${productName} için ${totalCost} kredi harcanacak. Onaylıyor musunuz?`)) {
                // API çağrısı
                fetch('/api/buy-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, productId, quantity })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('✅ Sipariş onay bekliyor!');
                    } else {
                        alert('❌ ' + data.error);
                    }
                });
            }
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.admin-tabs button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById('admin' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadAdminData() {
            // Load users for selects
            try {
                const response = await fetch('/api/admin/users');
                const users = await response.json();
                
                const selects = ['creditUserId', 'sendUserId'];
                selects.forEach(selectId => {
                    const select = document.getElementById(selectId);
                    select.innerHTML = '<option value="">Kullanıcı Seç</option>';
                    users.forEach(user => {
                        select.innerHTML += `<option value="${user.id}">${user.name} (${user.discordId})</option>`;
                    });
                });

                // Load users list
                const usersList = document.getElementById('usersList');
                usersList.innerHTML = users.map(user => `
                    <div class="user-item">
                        <strong>${user.name}</strong><br>
                        Discord: ${user.discordId}<br>
                        E-posta: ${user.email}<br>
                        Kredi: ${user.credits}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Admin verileri yüklenemedi:', error);
            }

            // Load products for select
            loadProducts().then(() => {
                const response = fetch('/api/products');
                response.then(res => res.json()).then(products => {
                    const select = document.getElementById('sendProductId');
                    select.innerHTML = '<option value="">Ürün Seç</option>';
                    products.forEach(product => {
                        select.innerHTML += `<option value="${product.id}">${product.name}</option>`;
                    });
                });
            });
        }

        async function addProduct(event) {
            event.preventDefault();
            
            const name = document.getElementById('adminProductName').value;
            const quantity = document.getElementById('adminProductQuantity').value;
            const credits = document.getElementById('adminProductCredits').value;

            try {
                const response = await fetch('/api/admin/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, quantity, credits })
                });

                if (response.ok) {
                    alert('✅ Ürün eklendi!');
                    event.target.reset();
                    loadProducts();
                    loadAdminData();
                } else {
                    alert('❌ Hata!');
                }
            } catch (error) {
                alert('❌ Hata: ' + error.message);
            }
        }

        async function giveCredits(event) {
            event.preventDefault();
            
            const userId = document.getElementById('creditUserId').value;
            const amount = document.getElementById('creditAmount').value;

            try {
                const response = await fetch('/api/admin/give-credits', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, amount })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Kredi verildi!');
                    event.target.reset();
                    loadAdminData();
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (error) {
                alert('❌ Hata: ' + error.message);
            }
        }

        async function sendAccount(event) {
            event.preventDefault();
            
            const userId = document.getElementById('sendUserId').value;
            const productId = document.getElementById('sendProductId').value;
            const accountDetails = document.getElementById('accountDetails').value;

            try {
                const response = await fetch('/api/admin/send-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, productId, accountDetails })
                });

                if (response.ok) {
                    alert('✅ Hesap gönderildi!');
                    event.target.reset();
                } else {
                    alert('❌ Hata!');
                }
            } catch (error) {
                alert('❌ Hata: ' + error.message);
            }
        }

        // Sayfa yüklendiğinde
        loadProducts();
        setInterval(loadProducts, 5000); // Her 5 saniyede yenile
    </script>
</body>
</html>
