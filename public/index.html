<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwozez Discord Botu - Canlı Stok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ecf0f1;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: #16213e;
            border-radius: 10px;
            border: 2px solid #e94560;
        }

        h1 {
            font-size: 2.5em;
            color: #e94560;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #95a5a6;
            font-size: 1.1em;
        }

        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stock-card {
            background: #16213e;
            border: 2px solid #e94560;
            border-radius: 10px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
            border-color: #d93654;
        }

        .stock-card h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .stock-info {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .stock-info p {
            color: #bdc3c7;
            margin: 8px 0;
        }

        .product-count {
            font-size: 1.3em;
            color: #2ecc71;
            font-weight: bold;
        }

        .products-list {
            max-height: 300px;
            overflow-y: auto;
            background: #0f3460;
            border-radius: 5px;
            padding: 10px;
        }

        .product-item {
            background: #1a1a2e;
            padding: 10px;
            margin: 8px 0;
            border-left: 3px solid #e94560;
            border-radius: 3px;
            font-size: 0.95em;
            color: #ecf0f1;
        }

        .product-name {
            font-weight: bold;
            color: #2ecc71;
        }

        .product-details {
            font-size: 0.85em;
            color: #95a5a6;
            margin-top: 5px;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .empty-message {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            font-style: italic;
        }

        .admin-link {
            display: block;
            text-align: center;
            padding: 15px;
            background: #f39c12;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .admin-link:hover {
            background: #e67e22;
        }

        footer {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            border-top: 1px solid #16213e;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .stocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Zwozez Discord Botu</h1>
            <p class="subtitle">Canlı Stok Gösterimi</p>
        </header>

        <a href="/admin" class="admin-link">⚙️ Yönetim Paneline Git</a>

        <div class="stocks-grid" id="stocksContainer">
            <p style="text-align: center; grid-column: 1/-1; color: #7f8c8d;">Stoklar yükleniyor...</p>
        </div>

        <footer>
            <p>&copy; 2026 Zwozez discord botu. Tüm hakları saklıdır.</p>
        </footer>
    </div>

    <script>
        async function loadStocks() {
            try {
                const response = await fetch('/api/stocks');
                const stocks = await response.json();
                
                const container = document.getElementById('stocksContainer');
                
                if (stocks.length === 0) {
                    container.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: #7f8c8d;">Henüz stok eklenmemiş.</p>';
                    return;
                }

                container.innerHTML = stocks.map(stock => {
                    const products = getProductsForStock(stock.id);
                    return `
                        <div class="stock-card">
                            <h2>📦 ${stock.name}</h2>
                            <div class="stock-info">
                                <p>Ürün Sayısı: <span class="product-count">${stock.productCount}</span></p>
                            </div>
                            <div class="products-list">
                                ${products.length === 0 ? 
                                    '<p class="empty-message">Bu stokta ürün yok</p>' :
                                    products.map(product => `
                                        <div class="product-item">
                                            <div class="product-name">🎮 ${product.name}</div>
                                            ${product.details ? `<div class="product-details">${product.details}</div>` : ''}
                                        </div>
                                    `).join('')
                                }
                            </div>
                        </div>
                    `;
                }).join('');

                // Tüm ürünleri sakla global olarak
                window.allStocks = stocks;
            } catch (error) {
                console.error('Stoklar yüklenemedi:', error);
                document.getElementById('stocksContainer').innerHTML = 
                    '<p style="text-align: center; grid-column: 1/-1; color: #e74c3c;">Stoklar yüklenemedi</p>';
            }
        }

        function getProductsForStock(stockId) {
            // API'den alınacak ürünleri filtreleme
            // Şimdilik boş dönüş, loadStocks sırasında fetch yapılacak
            return [];
        }

        // Sayfa yüklendiğinde
        loadStocks();
        // Her 5 saniyede bir yenile
        setInterval(loadStocks, 5000);
    </script>
</body>
</html>
