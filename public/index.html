<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwozez Discord Botu - Ürün Satış Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ecf0f1;
            min-height: 100vh;
        }

        header {
            background: #16213e;
            padding: 20px;
            border-bottom: 2px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: bold;
            color: #e94560;
        }

        nav {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        nav button, nav a {
            background: #e94560;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        nav button:hover, nav a:hover {
            background: #d93654;
            transform: translateY(-2px);
        }

        nav a.admin {
            background: #f39c12;
        }

        nav a.admin:hover {
            background: #e67e22;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 40px;
            border: 1px solid #e94560;
        }

        .hero h1 {
            font-size: 2.5em;
            color: #e94560;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 1.1em;
            color: #bdc3c7;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #16213e;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            max-width: 95%;
            border: 1px solid #e94560;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #e94560;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ecf0f1;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e94560;
            border-radius: 5px;
            font-size: 1em;
            background: #0f3460;
            color: #ecf0f1;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 5px #e94560;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #d93654;
        }

        .btn-close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #7f8c8d;
            cursor: pointer;
            transition: color 0.3s;
        }

        .btn-close:hover {
            color: #ecf0f1;
        }

        .products-section {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid #0f3460;
        }

        .products-section h2 {
            color: #e94560;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-align: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            border-bottom: 1px solid #e94560;
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.5em;
            color: #2ecc71;
            margin-bottom: 8px;
        }

        .product-stock {
            color: #95a5a6;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .product-link {
            color: #3498db;
            text-decoration: none;
            font-size: 0.9em;
            margin-bottom: 15px;
            display: block;
            word-break: break-all;
        }

        .product-link:hover {
            text-decoration: underline;
        }

        .btn-buy {
            width: 100%;
            padding: 10px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-buy:hover {
            background: #d93654;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            max-width: 90%;
        }

        .message.success {
            background: #2ecc71;
            color: white;
        }

        .message.error {
            background: #e74c3c;
            color: white;
        }

        .user-info {
            position: absolute;
            right: 20px;
            top: 20px;
            color: #ecf0f1;
            font-size: 0.9em;
        }

        .user-credits {
            color: #2ecc71;
            font-weight: bold;
        }

        footer {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            margin-top: 40px;
            border-top: 1px solid #16213e;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .hero h1 {
                font-size: 1.8em;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">🎮 Zwozez Bot</div>
            <div id="userInfo" class="user-info" style="display: none;">
                <span id="userName"></span> | Kredi: <span class="user-credits" id="userCredits">0</span>₺
            </div>
            <nav>
                <button id="loginBtn" onclick="openModal('loginModal')">Giriş Yap</button>
                <button id="registerBtn" onclick="openModal('registerModal')">Kayıt Ol</button>
                <button id="logoutBtn" onclick="handleLogout()" style="display: none; background: #95a5a6;">Çıkış Yap</button>
                <a href="admin.html" class="admin">Admin</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>🎮 Zwozez Discord Botu</h1>
            <p>Güvenli ürün satış ve kredi sistemi. Discord üzerinde ürünleri satın alın!</p>
        </div>

        <div id="message"></div>

        <div class="products-section">
            <h2>📦 Satılık Ürünler</h2>
            <div class="products-grid" id="productsList">
                <p style="text-align: center; grid-column: 1/-1; color: #7f8c8d;">Ürünler yükleniyor...</p>
            </div>
        </div>
    </div>

    <!-- Giriş Yap Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="btn-close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Giriş Yap</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Discord ID:</label>
                    <input type="text" id="loginDiscordId" required>
                </div>
                <div class="form-group">
                    <label>Şifre:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-submit">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Kayıt Ol Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="btn-close" onclick="closeModal('registerModal')">&times;</span>
            <h2>Kayıt Ol</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı:</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Discord ID:</label>
                    <input type="text" id="regDiscordId" required>
                </div>
                <div class="form-group">
                    <label>E-posta:</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Şifre:</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn-submit">Kayıt Ol</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Zwozez discord botu. Tüm hakları saklıdır.</p>
    </footer>

    <script>
        let currentUser = null;

        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                msgDiv.innerHTML = '';
            }, 5000);
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('userName').textContent = currentUser.username;
                document.getElementById('userCredits').textContent = currentUser.credits;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('registerBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
            } else {
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('loginBtn').style.display = 'inline-block';
                document.getElementById('registerBtn').style.display = 'inline-block';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const discordId = document.getElementById('regDiscordId').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, discordId, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Kayıt başarılı! Giriş yapabilirsiniz.', 'success');
                    closeModal('registerModal');
                    document.getElementById('registerModal').querySelector('form').reset();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Hata: ' + error.message, 'error');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const discordId = document.getElementById('loginDiscordId').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ discordId, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentUser = data;
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('credits', data.credits);
                    showMessage(`Hoş geldiniz ${data.username}!`, 'success');
                    closeModal('loginModal');
                    document.getElementById('loginModal').querySelector('form').reset();
                    updateUI();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Hata: ' + error.message, 'error');
            }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            localStorage.removeItem('credits');
            updateUI();
            showMessage('Çıkış yapıldı', 'success');
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const productsList = document.getElementById('productsList');
                
                if (products.length === 0) {
                    productsList.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: #7f8c8d;">Henüz ürün eklenmemiş.</p>';
                    return;
                }

                productsList.innerHTML = products.map(product => `
                    <div class="product-card">
                        <div class="product-image">${product.image || '📦'}</div>
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">${product.price}₺</div>
                            <div class="product-stock">📊 Stok: ${product.stock}</div>
                            ${product.link ? `<a href="${product.link}" class="product-link" target="_blank">🔗 Bağlantı</a>` : ''}
                            <button class="btn-buy" onclick="buyProduct('${product.id}')" ${!currentUser ? 'disabled' : ''}>
                                ${currentUser ? '🛒 Satın Al' : '🔒 Giriş Yapınız'}
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ürünler yüklenemedi:', error);
            }
        }

        async function buyProduct(productId) {
            if (!currentUser) {
                showMessage('Lütfen giriş yapınız', 'error');
                return;
            }

            try {
                const response = await fetch('/api/request-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.userId, productId })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Satın alma isteği oluşturuldu. Admin onayı bekleyin.', 'success');
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Hata: ' + error.message, 'error');
            }
        }

        // Sayfa yüklendiğinde
        const userId = localStorage.getItem('userId');
        if (userId) {
            currentUser = {
                userId,
                username: localStorage.getItem('username'),
                credits: parseInt(localStorage.getItem('credits') || 0)
            };
        }
        updateUI();
        loadProducts();
    </script>
</body>
</html>
