<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok & Ürün Yönetimi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 35px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.05em;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #2ecc71;
            color: white;
        }

        .error {
            background: #e74c3c;
            color: white;
        }

        .list-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .list-section h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4em;
        }

        .list-items {
            display: grid;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .list-item {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.3);
        }

        .list-item-name {
            font-weight: 600;
            font-size: 1.2em;
            margin-bottom: 8px;
        }

        .list-item-detail {
            font-size: 0.95em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        @media (max-width: 968px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .card h2 {
                font-size: 1.5em;
            }
        }

        /* Scrollbar özelleştirme */
        .list-items::-webkit-scrollbar {
            width: 8px;
        }

        .list-items::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .list-items::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        .list-items::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Stok & Ürün Yönetimi</h1>
            <p>OWO Sistemi için stok ve ürün ekleyin</p>
        </div>

        <div class="content">
            <!-- SOL: STOK EKLE -->
            <div class="card">
                <h2>📦 Stok Ekle</h2>
                <div class="message success" id="stockSuccessMessage"></div>
                <div class="message error" id="stockErrorMessage"></div>
                
                <div class="form-group">
                    <label>Stok Adı *</label>
                    <input type="text" id="stockName" placeholder="örn: Valorant Hesapları">
                </div>
                
                <div class="form-group">
                    <label>OWO Kredisi *</label>
                    <input type="number" id="stockCredits" placeholder="10" value="10">
                </div>
                
                <button class="btn" onclick="addStock()">➕ Stok Ekle</button>

                <div class="list-section">
                    <h3>📋 Stok Listesi</h3>
                    <div class="list-items" id="stockList">
                        <div class="loading">Yükleniyor...</div>
                    </div>
                </div>
            </div>

            <!-- SAĞ: ÜRÜN EKLE -->
            <div class="card">
                <h2>🎁 Ürün Ekle</h2>
                <div class="message success" id="productSuccessMessage"></div>
                <div class="message error" id="productErrorMessage"></div>
                
                <div class="form-group">
                    <label>Ürün Adı *</label>
                    <input type="text" id="productName" placeholder="örn: Valorant Premium Account">
                </div>
                
                <div class="form-group">
                    <label>Ürün Bağlantısı</label>
                    <input type="text" id="productLink" placeholder="https://example.com/product">
                </div>
                
                <div class="form-group">
                    <label>Açıklama</label>
                    <textarea id="productDescription" rows="3" placeholder="Ürün hakkında detaylı bilgi..."></textarea>
                </div>
                
                <button class="btn" onclick="addProduct()">➕ Ürün Ekle</button>

                <div class="list-section">
                    <h3>📋 Ürün Listesi</h3>
                    <div class="list-items" id="productList">
                        <div class="loading">Yükleniyor...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Stok ekle
        async function addStock() {
            const name = document.getElementById('stockName').value;
            const credits = parseInt(document.getElementById('stockCredits').value) || 0;

            if (!name) {
                showMessage('stockErrorMessage', '❌ Stok adı gerekli!');
                return;
            }

            try {
                const id = 'stock-' + Date.now();
                const response = await fetch('/api/stock/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, credits, type: 'stock' })
                });

                const result = await response.json();
                if (result.success) {
                    showMessage('stockSuccessMessage', '✅ Stok eklendi!');
                    document.getElementById('stockName').value = '';
                    document.getElementById('stockCredits').value = '10';
                    loadStock();
                } else {
                    showMessage('stockErrorMessage', result.error || 'Hata oluştu');
                }
            } catch (error) {
                console.error('Stok ekleme hatası:', error);
                showMessage('stockErrorMessage', '❌ Stok eklenemedi');
            }
        }

        // Ürün ekle
        async function addProduct() {
            const name = document.getElementById('productName').value;
            const link = document.getElementById('productLink').value;
            const description = document.getElementById('productDescription').value;

            if (!name) {
                showMessage('productErrorMessage', '❌ Ürün adı gerekli!');
                return;
            }

            try {
                const id = 'product-' + Date.now();
                const response = await fetch('/api/stock/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, link, description, type: 'product' })
                });

                const result = await response.json();
                if (result.success) {
                    showMessage('productSuccessMessage', '✅ Ürün eklendi!');
                    document.getElementById('productName').value = '';
                    document.getElementById('productLink').value = '';
                    document.getElementById('productDescription').value = '';
                    loadProducts();
                } else {
                    showMessage('productErrorMessage', result.error || 'Hata oluştu');
                }
            } catch (error) {
                console.error('Ürün ekleme hatası:', error);
                showMessage('productErrorMessage', '❌ Ürün eklenemedi');
            }
        }

        // Stok listesini yükle
        async function loadStock() {
            try {
                const response = await fetch('/api/stock');
                const data = await response.json();
                const stockList = document.getElementById('stockList');

                const stocks = Object.entries(data).filter(([id, item]) => item.type === 'stock' || !item.type);
                
                if (stocks.length === 0) {
                    stockList.innerHTML = '<p class="loading">Stokta ürün yok</p>';
                    return;
                }

                stockList.innerHTML = stocks.map(([id, stock]) => `
                    <div class="list-item">
                        <div class="list-item-name">${stock.name}</div>
                        <div class="list-item-detail">💰 ${stock.credits || 0} OWO Kredisi</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Stok yükleme hatası:', error);
            }
        }

        // Ürün listesini yükle
        async function loadProducts() {
            try {
                const response = await fetch('/api/stock');
                const data = await response.json();
                const productList = document.getElementById('productList');

                const products = Object.entries(data).filter(([id, item]) => item.type === 'product');
                
                if (products.length === 0) {
                    productList.innerHTML = '<p class="loading">Ürün yok</p>';
                    return;
                }

                productList.innerHTML = products.map(([id, product]) => `
                    <div class="list-item">
                        <div class="list-item-name">${product.name}</div>
                        ${product.link ? `<div class="list-item-detail">🔗 ${product.link}</div>` : ''}
                        ${product.description ? `<div class="list-item-detail">📝 ${product.description}</div>` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ürün yükleme hatası:', error);
            }
        }

        function showMessage(id, message) {
            const msg = document.getElementById(id);
            msg.textContent = message;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        // İlk yükleme
        loadStock();
        loadProducts();

        // Otomatik güncelleme
        setInterval(loadStock, 15000);
        setInterval(loadProducts, 15000);
    </script>
</body>
</html>
