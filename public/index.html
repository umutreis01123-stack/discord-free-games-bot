<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZWOZ Reklam Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .stat-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .stat-card p {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: #667eea;
        }

        .tab-btn:hover {
            background: #667eea;
            color: white;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .success {
            color: #2ecc71;
            margin-top: 10px;
            padding: 10px;
            background: #e8f8f5;
            border-radius: 5px;
            display: none;
            border-left: 4px solid #2ecc71;
        }

        .error {
            color: #e74c3c;
            margin-top: 10px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 5px;
            display: none;
            border-left: 4px solid #e74c3c;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .photo-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .photo-item:hover {
            transform: scale(1.05);
        }

        .photo-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .photo-info {
            padding: 10px;
            background: #f9f9f9;
            font-size: 0.85em;
            color: #666;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        #photoFile {
            display: none;
        }

        .file-input-label {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📢 ZWOZ Reklam Paneli</h1>
            <p>Fotoğraf Yönetim Sistemi</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <h2>📸 Onaylanan</h2>
                <p id="approved-count">0</p>
            </div>
            <div class="stat-card">
                <h2>⏳ Beklemede</h2>
                <p id="pending-count">0</p>
            </div>
            <div class="stat-card">
                <h2>🔒 Kontrol</h2>
                <p id="check-status">Yükleniyor...</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">📤 Fotoğraf Yükle</button>
            <button class="tab-btn" onclick="switchTab('approved')">✅ Onaylanan</button>
            <button class="tab-btn" onclick="switchTab('pending')">⏳ Beklemede</button>
        </div>

        <!-- FOTOĞRAF YÜKLE -->
        <div id="upload" class="tab-content active">
            <h2>📤 Fotoğraf Yükle</h2>
            <form onsubmit="uploadPhoto(event)">
                <div class="form-group">
                    <label>İsim:</label>
                    <input type="text" id="uploader" placeholder="Adınız" required>
                </div>

                <div class="form-group">
                    <label>Fotoğraf:</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <label class="file-input-label">
                            Fotoğraf Seç
                            <input type="file" id="photoFile" accept="image/*" required>
                        </label>
                        <span id="fileName" style="color: #666;"></span>
                    </div>
                </div>

                <button type="submit">📤 Yükle</button>
                <div class="success" id="upload-success">✅ Fotoğraf yüklendi!</div>
                <div class="error" id="upload-error"></div>
            </form>
        </div>

        <!-- ONAYLANAN FOTOĞRAFLAR -->
        <div id="approved" class="tab-content">
            <h2>✅ Onaylanan Fotoğraflar</h2>
            <div id="approvedPhotos" style="margin-top: 20px;">
                <p class="loading">Yükleniyor...</p>
            </div>
        </div>

        <!-- BEKLEMEDE OLAN FOTOĞRAFLAR -->
        <div id="pending" class="tab-content">
            <h2>⏳ Beklemede Olan Fotoğraflar</h2>
            <div id="pendingPhotos" style="margin-top: 20px;">
                <p class="loading">Yükleniyor...</p>
            </div>
        </div>
    </div>

    <script>
        // TAB SWITCHING
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'approved') {
                loadApprovedPhotos();
            } else if (tabName === 'pending') {
                loadPendingPhotos();
            }
        }

        // FOTOĞRAF DOSYA SEÇIMI
        document.getElementById('photoFile').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName ? `✓ ${fileName}` : '';
        });

        // FOTOĞRAF YÜKLE
        async function uploadPhoto(event) {
            event.preventDefault();
            const file = document.getElementById('photoFile').files[0];
            const uploader = document.getElementById('uploader').value;

            if (!file) {
                showError('upload-error', 'Fotoğraf seçin!');
                return;
            }

            const formData = new FormData();
            formData.append('photo', file);
            formData.append('uploader', uploader);

            try {
                const response = await fetch('/api/upload-photo', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('upload-success').style.display = 'block';
                    document.getElementById('photoFile').value = '';
                    document.getElementById('fileName').textContent = '';
                    setTimeout(() => {
                        document.getElementById('upload-success').style.display = 'none';
                    }, 3000);
                    loadStats();
                } else {
                    showError('upload-error', result.error);
                }
            } catch (error) {
                showError('upload-error', error.message);
            }
        }

        // ONAYLANAN FOTOĞRAFLAR YÜKLE
        async function loadApprovedPhotos() {
            try {
                const response = await fetch('/api/approved-photos');
                const data = await response.json();

                const container = document.getElementById('approvedPhotos');
                
                if (data.photos.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999;">Henüz onaylanan fotoğraf yok</p>';
                    return;
                }

                container.innerHTML = '<div class="photo-grid">' +
                    data.photos.map(photo => `
                        <div class="photo-item">
                            <div class="photo-info">
                                <strong>${photo.uploader}</strong><br>
                                <small>${new Date(photo.uploadedAt).toLocaleString('tr-TR')}</small>
                            </div>
                        </div>
                    `).join('') +
                    '</div>';
            } catch (error) {
                console.error('Fotoğraf yükleme hatası:', error);
            }
        }

        // BEKLEMEDE OLAN FOTOĞRAFLAR YÜKLE
        async function loadPendingPhotos() {
            try {
                const response = await fetch('/api/pending-photos');
                const data = await response.json();

                const container = document.getElementById('pendingPhotos');
                
                if (data.photos.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999;">Beklemede fotoğraf yok</p>';
                    return;
                }

                container.innerHTML = '<div class="photo-grid">' +
                    data.photos.map(photo => `
                        <div class="photo-item">
                            <div class="photo-info">
                                <strong>${photo.uploader}</strong><br>
                                <small>${new Date(photo.uploadedAt).toLocaleString('tr-TR')}</small><br>
                                <span style="background: #f39c12; color: white; padding: 2px 5px; border-radius: 3px;">⏳ Beklemede</span>
                            </div>
                        </div>
                    `).join('') +
                    '</div>';
            } catch (error) {
                console.error('Fotoğraf yükleme hatası:', error);
            }
        }

        // İSTATİSTİKLER YÜKLE
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                document.getElementById('approved-count').textContent = data.approvedPhotos;
                document.getElementById('pending-count').textContent = data.pendingPhotos;
                document.getElementById('check-status').textContent = data.photoCheckEnabled ? '✅ Aktif' : '❌ Pasif';
            } catch (error) {
                console.error('İstatistik yükleme hatası:', error);
            }
        }

        // HATA GÖSTERİ
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = '❌ Hata: ' + message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        // BAŞLANGIÇ
        loadStats();
        setInterval(loadStats, 10000);
    </script>
</body>
</html>
