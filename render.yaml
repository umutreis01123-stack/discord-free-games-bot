services:
  - type: web
    name: discord-free-games-bot
    env: node
    buildCommand: npm install
    startCommand: npm run both
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
    healthCheckPath: /health
    autoDeploy: true
    plan: free